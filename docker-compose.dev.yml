services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:6.0
    container_name: mongo_container
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_kraft
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk # Bắt buộc có mã base64 này cho Confluent KRaft
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT_INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/var/lib/kafka/data # Đường dẫn chuẩn của Confluent

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local_kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  databrick-mock:
    build: ./mock-databrick
    container_name: databricks_mock
    ports:
      - "${DATABRICKS_MOCK_PORT:-8081}:8081"
    volumes:
      - .:/app
      - ./data:/app/data 
    environment:
      - PYTHONUNBUFFERED=1

  gateway:
    build: ./gateway
    container_name: api_gateway_no_ssl
    restart: always
    ports:
      - "${GATEWAY_PORT}:80"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - GATEWAY_PORT=80
      - AUTH_SERVICE_HOST=${AUTH_SERVICE_HOST}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT}
      - PRODUCT_SERVICE_HOST=${PRODUCT_SERVICE_HOST}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT}
      - CART_SERVICE_HOST=cart-service
      - CART_SERVICE_PORT=${CART_SERVICE_PORT}
      - ORDER_SERVICE_HOST=order_service
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT}
      - PAYMENT_SERVICE_HOST=payment_service
      - PAYMENT_SERVICE_PORT=${PAYMENT_SERVICE_PORT}
      - VNPAY_SERVICE_HOST=vnpay_service
      - VNPAY_SERVICE_PORT=${VNPAY_SERVICE_PORT:-8005}
      - KAFKA_UI_HOST=${KAFKA_UI_HOST}
      - KAFKA_UI_PORT=${KAFKA_UI_PORT}
    networks:
      - default
      - commerce-network
    depends_on:
      product-service:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    container_name: auth_service
    restart: always
    ports:
      - "${AUTH_SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
      - AUTH_ADMIN_USERNAME=${AUTH_ADMIN_USERNAME:-}
      - AUTH_ADMIN_PASSWORD=${AUTH_ADMIN_PASSWORD:-}
      - AUTH_ADMIN_EMAIL=${AUTH_ADMIN_EMAIL:-}
      - AUTH_ADMIN_FULL_NAME=${AUTH_ADMIN_FULL_NAME:-System Admin}
      - DEV_AUTO_SEED=true
      - DEV_SEED_FILE=/app/dev-seeds.json
    volumes:
      - ./dev-seeds.json:/app/dev-seeds.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres-db:
          condition: service_healthy
    networks:
      - default
      - commerce-network

  product-service:
    build: ./services/product-service
    container_name: product_service
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
      - PUBLIC_PRODUCTS_BASE_URL=${PUBLIC_PRODUCTS_BASE_URL:-http://localhost/api/v1/products}
      - DEV_AUTO_SEED=true
      - DEV_SEED_FILE=/app/dev-seeds.json
    ports:
      - "${PRODUCT_SERVICE_PORT:-8001}:8001"
    volumes:
      - ./services/product-service:/app
      - ./dev-seeds.json:/app/dev-seeds.json:ro
    depends_on:
      auth-service:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/books?page=1&page_size=1')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  cart-service:
    build: ./services/cart-service
    container_name: cart_service
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
    ports:
      - "${CART_SERVICE_PORT:-8002}:8002"
    volumes:
      - .:/services/cart-service
    depends_on:
      - postgres-db
    networks:
      - default
      - commerce-network

  order_service:
    build: ./services/order-service
    container_name: order_service
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
      - DEV_AUTO_SEED=true
      - DEV_SEED_FILE=/app/dev-seeds.json
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "${ORDER_SERVICE_PORT:-8003}:8003"
    volumes:
      - .:/services/order-service
      - ./dev-seeds.json:/app/dev-seeds.json:ro
    depends_on:
      product-service:
        condition: service_healthy

  payment_service:
    build: ./services/payment-service
    container_name: payment_service
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
    ports:
      - "${PAYMENT_SERVICE_PORT:-8004}:8004"
    volumes:
      - .:/services/payment-service
    depends_on:
      - postgres-db

  vnpay_service:
    build: ./services/vnpay-service
    container_name: vnpay_service
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
      - VNPAY_RETURN_URL=http://localhost:5173/orders
    ports:
      - "${VNPAY_SERVICE_PORT:-8005}:8005"
    volumes:
      - ./services/vnpay-service:/app
    depends_on:
      - postgres-db

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: react_frontend
    ports:
      - "${FRONTEND_DOCKER_PORT:-5175}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${GATEWAY_PORT:-80}/api/v1
    depends_on:
      - gateway
    networks:
      - default
volumes:
  postgres_data:
  mongo_data:
  kafka_data:
networks:
  commerce-network:
    driver: bridge
