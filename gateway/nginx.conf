server {
    listen 80;
    server_name ${DOMAIN_NAME};

    # Tự động chuyển hướng từ HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN_NAME};

    # Cấu hình chứng chỉ SSL (Sử dụng biến để không hard-code đường dẫn)
    ssl_certificate     /etc/nginx/ssl/${SSL_CERT_FILE};
    ssl_certificate_key /etc/nginx/ssl/${SSL_KEY_FILE};

    # Tối ưu bảo mật SSL
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Điều hướng cho Auth Service
    location /api/v1/auth/ {
        proxy_pass http://${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Điều hướng cho Product Service
    location /api/v1/products/ {
        proxy_pass http://${PRODUCT_SERVICE_HOST}:${PRODUCT_SERVICE_PORT}/;
        proxy_set_header Host $host;
    }
}