services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432" 

  mongo-db:
    image: mongo:6.0
    container_name: mongo_container
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_kraft
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk # Bắt buộc có mã base64 này cho Confluent KRaft
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/var/lib/kafka/data # Đường dẫn chuẩn của Confluent

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local_kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

  databrick-mock:
    build: ./mock-databrick
    container_name: databricks_mock
    ports:
      - "${DATABRICKS_MOCK_PORT:-8081}:8081"
    volumes:
      - .:/app
      - ./data:/app/data 
    environment:
      - PYTHONUNBUFFERED=1

  gateway:
    build: ./gateway
    container_name: api_gateway_no_ssl
    restart: always
    ports:
      - "${GATEWAY_PORT}:80"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - GATEWAY_PORT=80
      - AUTH_SERVICE_HOST=${AUTH_SERVICE_HOST}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT}
      - PRODUCT_SERVICE_HOST=${PRODUCT_SERVICE_HOST}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT}
      - KAFKA_UI_HOST=${KAFKA_UI_HOST}
      - KAFKA_UI_PORT=${KAFKA_UI_PORT}
    networks:
      - commerce-network

  auth-service:
    build: ./services/auth-service
    container_name: auth_service
    restart: always
    ports:
      - "${AUTH_SERVICE_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
    depends_on:
      - postgres-db
    networks:
      - default
      - commerce-network

  # product-service:
  #   build: ./services/product-service
  #   networks:
  #     - commerce-network

volumes:
  postgres_data:
  mongo_data:
  kafka_data:

networks:
  commerce-network:
    driver: bridge
